<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link rel="stylesheet" href="/vendor/katex/katex.min.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-toolbar">
        <div id="sidebar-header">
          <span id="sidebar-title">Files</span>
          <button id="sidebar-toggle" title="Hide sidebar">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.354 3.646a.5.5 0 0 1 0 .708L6.707 9l4.647 4.646a.5.5 0 0 1-.708.708l-5-5a.5.5 0 0 1 0-.708l5-5a.5.5 0 0 1 .708 0z"/></svg>
          </button>
        </div>
        <div id="search-box">
          <input type="text" id="search-input" placeholder="Search files...">
        </div>
        <div id="toolbar-buttons">
          <button id="open-file-btn" title="Open file by path">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 3.5A1.5 1.5 0 0 1 3 2h4.586a1 1 0 0 1 .707.293l1.414 1.414a1 1 0 0 0 .707.293H13a1.5 1.5 0 0 1 1.5 1.5v7A1.5 1.5 0 0 1 13 14H3a1.5 1.5 0 0 1-1.5-1.5v-9z"/></svg>
            Open File
          </button>
          <button id="upload-btn" title="Upload .md files">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M7.5 1a.5.5 0 0 1 .5.5V7h5.5a.5.5 0 0 1 0 1H8v5.5a.5.5 0 0 1-1 0V8H1.5a.5.5 0 0 1 0-1H7V1.5a.5.5 0 0 1 .5-.5z"/></svg>
            Upload
          </button>
        </div>
        <input type="file" id="file-input" accept=".md,.markdown,.txt" multiple hidden>
      </div>
      <div id="file-tree"></div>
      <div id="sidebar-resize"></div>
    </aside>
    <main id="main">
      <button id="sidebar-show" title="Show sidebar" class="hidden">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.646 3.646a.5.5 0 0 1 .708 0l5 5a.5.5 0 0 1 0 .708l-5 5a.5.5 0 0 1-.708-.708L9.293 9 4.646 4.354a.5.5 0 0 1 0-.708z"/></svg>
      </button>
      <div id="tab-bar-wrapper">
        <div id="tab-bar"></div>
        <button id="export-pdf-btn" title="Export to PDF">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 2A1.5 1.5 0 0 0 3 3.5v9A1.5 1.5 0 0 0 4.5 14h7a1.5 1.5 0 0 0 1.5-1.5V6.621a1.5 1.5 0 0 0-.44-1.06L9.94 2.94A1.5 1.5 0 0 0 8.878 2.5H4.5z"/><path d="M5.5 9.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 0 1H6a.5.5 0 0 1-.5-.5zm0 2a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 0 1H6a.5.5 0 0 1-.5-.5z" fill="white"/></svg>
          <span>PDF</span>
        </button>
      </div>
      <div id="tab-content"></div>
      <div id="empty-state">
        <p>Select a markdown file from the sidebar, or drag &amp; drop .md files here.</p>
      </div>
      <div id="drop-overlay">
        <div id="drop-overlay-inner">Drop .md files here</div>
      </div>
    </main>
  </div>

  <!-- File picker modal -->
  <div id="file-picker-overlay" class="modal-overlay hidden">
    <div id="file-picker" class="modal">
      <div class="modal-header">
        <span class="modal-title">Open File</span>
        <span id="picker-close" class="modal-close">&times;</span>
      </div>
      <div id="picker-path-bar">
        <button id="picker-up" title="Go up">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12.5a.5.5 0 0 1-.5-.5V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V12a.5.5 0 0 1-.5.5z"/></svg>
        </button>
        <input type="text" id="picker-path-input" placeholder="Path..." spellcheck="false">
        <button id="picker-go" title="Go to path">Go</button>
      </div>
      <div id="picker-list"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/vendor/markdown-it/markdown-it.min.js"></script>
  <script src="/vendor/katex/katex.min.js"></script>
  <script>if(typeof module==='undefined'){window.module={};}</script>
  <script src="/vendor/texmath/texmath.js"></script>
  <script>if(window.module&&window.module.exports){window.texmath=window.module.exports;delete window.module;}</script>
  <script src="/js/renderer.js"></script>
  <script src="/js/tabs.js"></script>
  <script src="/js/export.js"></script>
  <script src="/js/filepicker.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/websocket.js"></script>
  <script src="/js/upload.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
